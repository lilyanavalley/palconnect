
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

features:
  - buildpack-stack=ubuntu-22

name: palconnect-prod
region: tor

services:
  - dockerfile_path: /Dockerfile
    envs:
    - key: DISCORD_TOKEN
      scope: RUN_TIME
      type: SECRET
    - key: PALWORLD_ADMIN_PASSWORD
      scope: RUN_TIME
      type: SECRET
    - key: PALWORLD_API_URL
      scope: RUN_TIME
      type: GENERAL
    http_port: 3000
    image:
      deploy_on_push:
        enabled: true
      registry: ghcr.io
      registry_type: GHCR
      repository: lilyanavalley/palconnect
      tag: latest
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-2gb
    name: palconnect-prod
    source_dir: /
