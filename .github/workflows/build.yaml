name: Build

on:  
  workflow_call:
    secrets:
      CARGO_PACKAGER_SIGN_PRIVATE_KEY:
        description: 'Private key for signing packages'
        required: true
      CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD:
        description: 'Password for the private key'
        required: true
    outputs:
      artifacts:
        description: "Build artifacts information"
        value: ${{ jobs.building.outputs.artifacts }}
  push:
    tags:
      - v*.*.*

jobs:

  testing:
    uses: ./.github/workflows/testing.yaml
  
  building:
    needs: testing
    outputs:
      artifacts: ${{ steps.build-info.outputs.artifacts }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: deb
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: msi
    runs-on: ${{ matrix.os }}
    steps:
      
      - uses: actions/checkout@v4

      - run: rustup toolchain install stable

      - name: Install build dependencies
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt install -y pkg-config
          fi 
        shell: bash

      - name: Install binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
      
      - name: Install cargo-packager
        run: cargo binstall -y cargo-packager

      - uses: Swatinem/rust-cache@v2

      - name: Package application with sign
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
          CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          # * Workaround to handle MSI format with cargo-packager
          if [ "${{ matrix.artifact_suffix }}" == "msi" ]; then
            cargo packager --release --formats wix
          else
            cargo packager --release --formats ${{ matrix.artifact_suffix }}
          fi

      - name: Set build info
        id: build-info
        run: |
          echo "artifacts=target/release/" >> $GITHUB_OUTPUT
        shell: bash

      - name: Verify artifact exists
        run: |
          ARTIFACTS=(target/release/*.${{ matrix.artifact_suffix }})
          if [ ! -f "${ARTIFACTS[0]}" ]; then
            echo "No artifacts found matching target/release/*.${{ matrix.artifact_suffix }}"
            ls -la target/release/
            exit 1
          fi
          echo "Found artifact: ${ARTIFACTS[0]}"
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: palconnect-${{ matrix.os }}-${{ matrix.artifact_suffix }}-${{ github.sha }}
          path: target/release/*.${{ matrix.artifact_suffix }}
          retention-days: 30

