name: Build

on:  
  workflow_call:
    inputs:
      enable_signing:
        description: 'Enable package signing'
        required: false
        default: false
        type: boolean
    secrets:
      PACKAGER_PRIVATE_KEY:
        description: 'Private key for signing packages'
        required: false
      PACKAGER_PRIVATE_KEY_PASSWORD:
        description: 'Password for the private key'
        required: false
    outputs:
      artifacts:
        description: "Build artifacts information"
        value: ${{ jobs.building.outputs.artifacts }}
  push:
    branches:
      - live

jobs:

  testing:
    uses: ./.github/workflows/testing.yaml
  
  building:
    needs: testing
    outputs:
      artifacts: ${{ steps.build-info.outputs.artifacts }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: deb
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: wix
    runs-on: ${{ matrix.os }}
    steps:
      
      - uses: actions/checkout@v4

      - run: rustup toolchain install stable

      - name: Install build dependencies
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt install -y pkg-config
          fi 
        shell: bash

      - name: Install binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
      
      - name: Install cargo-packager
        run: cargo binstall -y cargo-packager

      - uses: Swatinem/rust-cache@v2

      - name: Check signing availability
        id: check-signing
        if: ${{ inputs.enable_signing }}
        env:
          PACKAGER_PRIVATE_KEY: ${{ secrets.PACKAGER_PRIVATE_KEY }}
        run: |
          if [ -n "$PACKAGER_PRIVATE_KEY" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "$PACKAGER_PRIVATE_KEY" > /tmp/packager_key.key
            chmod 600 /tmp/packager_key.key
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Package application (with signing)
        if: ${{ inputs.enable_signing && steps.check-signing.outputs.available == 'true' }}
        env:
          PACKAGER_PRIVATE_KEY_PASSWORD: ${{ secrets.PACKAGER_PRIVATE_KEY_PASSWORD }}
        run: |
          cargo packager --release --formats ${{ matrix.artifact_suffix }} \
            -k /tmp/packager_key.key \
            --password "$PACKAGER_PRIVATE_KEY_PASSWORD"

      - name: Package application (without signing)
        if: ${{ !inputs.enable_signing || steps.check-signing.outputs.available != 'true' }}
        run: cargo packager --release --formats ${{ matrix.artifact_suffix }}

      - name: Clean up signing key
        if: ${{ inputs.enable_signing && always() }}
        run: |
          rm -f /tmp/packager_key.key
        shell: bash

      - name: Set build info
        id: build-info
        run: |
          echo "artifacts=target/release/dist" >> $GITHUB_OUTPUT
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: palconnect-${{ matrix.os }}-${{ github.sha }}
          path: target/release/dist/
          retention-days: 30

