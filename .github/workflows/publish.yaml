name: Publish Release

on:  
  push:
    tags:
      - 'v*.*.*'  # Matches v1.0.0, v1.2.3, etc.

jobs:

  build:
    uses: ./.github/workflows/build.yaml

  create-release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.id }}
      upload-url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release-notes
        run: |
          cat > release_notes.md << EOF
          # PalConnect ${{ steps.version.outputs.VERSION }}
          
          ## What's Changed
          
          This release includes:
          - Latest Discord bot functionality for PalWorld server monitoring
          - Health check endpoint for cloud deployment
          - Cross-platform support (Windows, macOS, Linux)
          
          ## Installation
          
          Download the appropriate package for your system:
          - **Windows**: Download the `.msi` file
          - **macOS**: Download the `.dmg` file  
          - **Linux**: Download the `.deb` file
          
          ## Auto-Updates
          
          This version supports automatic updates via cargo-packager-updater.
          
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/v0.0.0...${{ steps.version.outputs.VERSION }}
          EOF

      - name: Create Release
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          release_name: PalConnect ${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false

  upload-artifacts:
    needs: [build, create-release]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: palconnect-ubuntu-latest-${{ github.sha }}
            asset-name: palconnect-linux-x86_64.deb
            content-type: application/vnd.debian.binary-package
          - os: macos-latest
            artifact-name: palconnect-macos-latest-${{ github.sha }}
            asset-name: palconnect-macos-x86_64.dmg
            content-type: application/x-apple-diskimage
          - os: windows-latest
            artifact-name: palconnect-windows-latest-${{ github.sha }}
            asset-name: palconnect-windows-x86_64.msi
            content-type: application/x-msi
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ./artifacts

      - name: Find package file
        id: find-package
        run: |
          # Find the actual package file in the artifacts directory
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            FILE=$(find ./artifacts -name "*.deb" | head -1)
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            FILE=$(find ./artifacts -name "*.dmg" | head -1)
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            FILE=$(find ./artifacts -name "*.msi" | head -1)
          fi
          echo "file-path=$FILE" >> $GITHUB_OUTPUT
          echo "Found package: $FILE"

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload-url }}
          asset_path: ${{ steps.find-package.outputs.file-path }}
          asset_name: ${{ matrix.asset-name }}
          asset_content_type: ${{ matrix.content-type }}

  update-cargo-packager-config:
    needs: [create-release, upload-artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update updater configuration
        run: |
          # Create or update updater config for cargo-packager-updater
          mkdir -p .updater
          cat > .updater/latest.json << EOF
          {
            "version": "${{ steps.version.outputs.VERSION }}",
            "notes": "Latest release of PalConnect with updated features and bug fixes.",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {
              "linux-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/palconnect-linux-x86_64.deb"
              },
              "darwin-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/palconnect-macos-x86_64.dmg"
              },
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/palconnect-windows-x86_64.msi"
              }
            }
          }
          EOF

      - name: Commit updater config
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .updater/latest.json
          git commit -m "Update auto-updater config for v${{ steps.version.outputs.VERSION }}" || exit 0
          git push
