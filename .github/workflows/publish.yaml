name: Publish Release

on:  
  push:
    tags:
      - 'v/*.*.*'  # Matches v1.0.0, v1.2.3, etc.

jobs:

  build:
    uses: ./.github/workflows/build.yaml
    secrets:
      CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
      CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release assets
        run: |
          mkdir -p ./release-assets
          
          # Debug: Show artifact structure
          echo "Artifact structure:"
          find ./artifacts -type f | sort
          
          # Find and rename package files
          find ./artifacts -name "*.deb" -exec cp {} ./release-assets/palconnect-linux-x86_64.deb \;
          find ./artifacts -name "*.dmg" -exec cp {} ./release-assets/palconnect-macos-x86_64.dmg \;
          find ./artifacts -name "*.msi" -exec cp {} ./release-assets/palconnect-windows-x86_64.msi \;
          
          # Find and rename signature files (if they exist)
          find ./artifacts -name "*.deb.sig" -exec cp {} ./release-assets/palconnect-linux-x86_64.deb.sig \; 2>/dev/null || true
          find ./artifacts -name "*.dmg.sig" -exec cp {} ./release-assets/palconnect-macos-x86_64.dmg.sig \; 2>/dev/null || true
          find ./artifacts -name "*.msi.sig" -exec cp {} ./release-assets/palconnect-windows-x86_64.msi.sig \; 2>/dev/null || true
          
          # List what we found
          echo "Release assets prepared:"
          ls -la ./release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: PalConnect ${{ steps.version.outputs.VERSION }}
          draft: true
          prerelease: false
          files: ./release-assets/*
          body: |
            # PalConnect ${{ steps.version.outputs.VERSION }}
            
            ## What's Changed
            
            This release includes:
            - Latest Discord bot functionality for PalWorld server monitoring
            - Health check endpoint for cloud deployment
            - Cross-platform support (Windows, macOS, Linux)
            
            ## Installation
            
            Download the appropriate package for your system:
            - **Windows**: Download the `.msi` file
            - **macOS**: Download the `.dmg` file  
            - **Linux**: Download the `.deb` file
            
            ## Auto-Updates
            
            This version supports automatic updates via cargo-packager-updater.
            
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v0.0.0...${{ steps.version.outputs.VERSION }}

  update-cargo-packager-config:
    needs: [create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts to extract signatures
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Extract signatures from artifacts
        id: extract-signatures
        run: |
          # Initialize signature variables
          LINUX_SIG=""
          DARWIN_SIG=""  
          WINDOWS_SIG=""
          
          # Debug: List all downloaded artifacts
          echo "Downloaded artifacts structure:"
          find ./artifacts -type f -name "*.sig" || echo "No .sig files found"
          
          # Extract Linux signature
          LINUX_SIG_FILE=$(find ./artifacts -name "palconnect-ubuntu-latest-deb-${{ github.sha }}-signature" -type d -exec find {} -name "*.deb.sig" \; | head -1)
          if [ -n "$LINUX_SIG_FILE" ] && [ -f "$LINUX_SIG_FILE" ]; then
            LINUX_SIG=$(base64 -w 0 "$LINUX_SIG_FILE")
            echo "Found Linux signature: $LINUX_SIG_FILE"
          else
            echo "Linux signature not found"
          fi
          
          # Extract macOS signature  
          DARWIN_SIG_FILE=$(find ./artifacts -name "palconnect-macos-latest-dmg-${{ github.sha }}-signature" -type d -exec find {} -name "*.dmg.sig" \; | head -1)
          if [ -n "$DARWIN_SIG_FILE" ] && [ -f "$DARWIN_SIG_FILE" ]; then
            DARWIN_SIG=$(base64 -w 0 "$DARWIN_SIG_FILE")
            echo "Found macOS signature: $DARWIN_SIG_FILE"
          else
            echo "macOS signature not found"
          fi
          
          # Extract Windows signature
          WINDOWS_SIG_FILE=$(find ./artifacts -name "palconnect-windows-latest-msi-${{ github.sha }}-signature" -type d -exec find {} -name "*.msi.sig" \; | head -1)
          if [ -n "$WINDOWS_SIG_FILE" ] && [ -f "$WINDOWS_SIG_FILE" ]; then
            WINDOWS_SIG=$(base64 -w 0 "$WINDOWS_SIG_FILE")
            echo "Found Windows signature: $WINDOWS_SIG_FILE"
          else
            echo "Windows signature not found"
          fi
          
          # Output signatures for next step
          echo "linux_signature=$LINUX_SIG" >> $GITHUB_OUTPUT
          echo "darwin_signature=$DARWIN_SIG" >> $GITHUB_OUTPUT
          echo "windows_signature=$WINDOWS_SIG" >> $GITHUB_OUTPUT

      - name: Update updater configuration
        run: |
          # Create or update updater config for cargo-packager-updater
          mkdir -p .updater
          cat > .updater/latest.json << EOF
          {
            "version": "${{ steps.version.outputs.VERSION }}",
            "notes": "Latest release of PalConnect with updated features and bug fixes.",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {
              "linux-x86_64": {
                "signature": "${{ steps.extract-signatures.outputs.linux_signature }}",
                "url": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/palconnect-linux-x86_64.deb"
              },
              "darwin-x86_64": {
                "signature": "${{ steps.extract-signatures.outputs.darwin_signature }}",
                "url": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/palconnect-macos-x86_64.dmg"
              },
              "windows-x86_64": {
                "signature": "${{ steps.extract-signatures.outputs.windows_signature }}",
                "url": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/palconnect-windows-x86_64.msi"
              }
            }
          }
          EOF

      - name: Commit updater config
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .updater/latest.json
          git commit -m "Update auto-updater config for v${{ steps.version.outputs.VERSION }}" || exit 0
          git push origin HEAD:live
