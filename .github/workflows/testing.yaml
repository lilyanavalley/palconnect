name: Run Rust Tests

on:
  workflow_call:
  push:
    branches:
      - live
      - canary
    tags:
      - v/**
  pull_request:
    types:
      - opened

jobs:
  testing:
    strategy:
      matrix:
        os: [ubuntu-latest,macos-latest,windows-latest]

    runs-on: ${{matrix.os}}
    steps:
      - run: cargo test
